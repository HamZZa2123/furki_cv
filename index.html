<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotoğraflı Kitap</title>
  <style>
    * {git status
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3f4f8, #e9ecf5);
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(20px, 3.5vw, 34px);
      text-align: center;
    }

    .note {
      margin: 0 0 18px;
      text-align: center;
      color: #4a4a4a;
      font-size: 14px;
    }

    #book {
      width: min(940px, 96vw);
      height: min(640px, 78vh);
      max-width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    .page {
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.08);
    }

    .page img {
      width: 100%;
      height: 86%;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #e6e6e6;
    }

    .page p {
      margin: 12px 0 0;
      font-size: 15px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Fotoğraf Albüm Kitabım</h1>
  <p class="note">Sayfayı tutup sürükleyerek çevir. Mobilde de çalışır.</p>

  <div id="book">
    <div class="page">
      <img src="https://picsum.photos/id/1015/900/1200" alt="Kapak görseli" />
      <p>Kapak</p>
    </div>
    <div class="page">
      <img src="https://picsum.photos/id/1018/900/1200" alt="Doğa fotoğrafı 1" />
      <p>Sayfa 1</p>
    </div>
    <div class="page">
      <img src="https://picsum.photos/id/1025/900/1200" alt="Doğa fotoğrafı 2" />
      <p>Sayfa 2</p>
    </div>
    <div class="page">
      <img src="https://picsum.photos/id/1035/900/1200" alt="Doğa fotoğrafı 3" />
      <p>Sayfa 3</p>
    </div>
    <div class="page">
      <img src="https://picsum.photos/id/1041/900/1200" alt="Doğa fotoğrafı 4" />
      <p>Sayfa 4</p>
    </div>
    <div class="page">
      <img src="https://picsum.photos/id/1069/900/1200" alt="Arka kapak görseli" />
      <p>Arka Kapak</p>
    </div>
  </div>

  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
  <script>
    const pageFlip = new St.PageFlip(document.getElementById("book"), {
      width: 470,
      height: 640,
      size: "stretch",
      minWidth: 280,
      maxWidth: 1200,
      minHeight: 360,
      maxHeight: 1600,
      maxShadowOpacity: 0.5,
      showCover: true,
      mobileScrollSupport: false
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));
  </script>
</body>
</html>
